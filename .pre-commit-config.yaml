repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: ./scripts/typecheck_backend.sh
        language: system
        types: [python]
        pass_filenames: false

      - id: frontend-lint
        name: frontend-lint
        entry: ./scripts/lint_frontend.sh --fix
        language: system
        files: ^src/apps/web/frontend/src/.*\.(ts|tsx)$
        pass_filenames: true

      - id: frontend-format
        name: frontend-format
        entry: ./scripts/format_frontend.sh
        language: system
        files: ^src/apps/web/frontend/src/.*\.(ts|tsx|css|json)$
        pass_filenames: true
