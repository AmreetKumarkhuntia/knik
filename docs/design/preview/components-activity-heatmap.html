<!doctype html>
<!-- @dsCard group="Components" name="Activity heatmap" subtitle="Day × hour run-activity grid (GitHub-style)" viewport="700x240" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 20px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fg-4);
        margin-bottom: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11.5px;
      }
      td {
        padding: 0;
        width: calc(100% / 24);
        height: 18px;
        position: relative;
      }
      .day {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
        padding-right: 10px;
        text-align: right;
        width: 28px;
        height: 18px;
      }
      .hr {
        font-family: var(--font-mono);
        font-size: 9.5px;
        color: var(--fg-5);
        text-align: center;
        padding-top: 4px;
      }
      .cell {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        margin: 2px auto;
        background: var(--bg-surface-2);
        border: 1px solid var(--border-1);
      }
      .l1 {
        background: rgba(0, 217, 244, 0.18);
        border-color: rgba(0, 217, 244, 0.25);
      }
      .l2 {
        background: rgba(0, 217, 244, 0.36);
        border-color: rgba(0, 217, 244, 0.45);
      }
      .l3 {
        background: rgba(0, 217, 244, 0.6);
        border-color: rgba(0, 217, 244, 0.7);
      }
      .l4 {
        background: var(--aurora-400);
        border-color: var(--aurora-300);
        box-shadow: 0 0 6px rgba(0, 217, 244, 0.6);
      }
      .legend {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
      }
      .legend span.swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--bg-surface-2);
        border: 1px solid var(--border-1);
      }
    </style>
  </head>
