<!doctype html>
<!-- @dsCard group="Components" name="Microphone recorder" subtitle="Live waveform recording + idle ready state" viewport="700x220" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 22px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      /* Composer mic state */
      .composer {
        background: var(--bg-glass);
        backdrop-filter: blur(20px) saturate(140%);
        border: 1px solid rgba(0, 217, 244, 0.45);
        border-radius: 14px;
        padding: 12px 14px;
        box-shadow: 0 0 0 4px rgba(0, 217, 244, 0.08);
      }
      .mic-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .mic {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.18);
        color: #ef4444;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        flex-shrink: 0;
      }
      .mic::before {
        content: "";
        position: absolute;
        inset: -6px;
        border: 2px solid rgba(239, 68, 68, 0.45);
        border-radius: 50%;
        animation: pulse 1.4s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.85);
          opacity: 1;
        }
        100% {
          transform: scale(1.25);
          opacity: 0;
        }
      }
      .wave {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 3px;
        height: 30px;
      }
      .wave span {
        width: 2.5px;
        background: linear-gradient(180deg, var(--aurora-300), var(--teal-400));
        border-radius: 2px;
        animation: bar 0.9s ease-in-out infinite alternate;
      }
      @keyframes bar {
        from {
          transform: scaleY(0.25);
        }
        to {
          transform: scaleY(1);
        }
      }
      .wave span:nth-child(1) {
        animation-delay: 0s;
        height: 60%;
      }
      .wave span:nth-child(2) {
        animation-delay: 0.1s;
        height: 85%;
      }
      .wave span:nth-child(3) {
        animation-delay: 0.15s;
        height: 50%;
      }
      .wave span:nth-child(4) {
        animation-delay: 0.2s;
        height: 100%;
      }
      .wave span:nth-child(5) {
        animation-delay: 0.25s;
        height: 70%;
      }
      .wave span:nth-child(6) {
        animation-delay: 0.3s;
        height: 95%;
      }
      .wave span:nth-child(7) {
        animation-delay: 0.35s;
        height: 45%;
      }
      .wave span:nth-child(8) {
        animation-delay: 0.4s;
        height: 80%;
      }
      .wave span:nth-child(9) {
        animation-delay: 0.45s;
        height: 55%;
      }
      .wave span:nth-child(10) {
        animation-delay: 0.5s;
        height: 75%;
      }
      .wave span:nth-child(11) {
        animation-delay: 0.55s;
        height: 90%;
      }
      .wave span:nth-child(12) {
        animation-delay: 0.6s;
        height: 60%;
      }
      .wave span:nth-child(13) {
        animation-delay: 0.65s;
        height: 100%;
      }
      .wave span:nth-child(14) {
        animation-delay: 0.7s;
        height: 50%;
      }
      .wave span:nth-child(15) {
        animation-delay: 0.75s;
        height: 70%;
      }
      .wave span:nth-child(16) {
        animation-delay: 0.8s;
        height: 85%;
      }
      .wave span:nth-child(17) {
        animation-delay: 0.85s;
        height: 55%;
      }
      .wave span:nth-child(18) {
        animation-delay: 0.9s;
        height: 95%;
      }
      .wave span:nth-child(19) {
        animation-delay: 0.95s;
        height: 40%;
      }
      .wave span:nth-child(20) {
        animation-delay: 1s;
        height: 70%;
      }
      .time {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--aurora-300);
        flex-shrink: 0;
      }
      .stop {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: #ef4444;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
      }
      .hint {
        margin-top: 8px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .hint b {
        color: var(--aurora-300);
        font-weight: 500;
      }

      /* Idle mic */
      .idle {
        background: var(--bg-surface-2);
        border: 1px solid var(--border-2);
        border-radius: 14px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .idle .row1 {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .idle .mic-ico {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--bg-surface-3);
        color: var(--fg-3);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ttl {
        font-size: 13px;
        font-weight: 600;
        color: var(--fg-1);
        letter-spacing: -0.012em;
      }
      .sub {
        font-size: 11.5px;
        color: var(--fg-3);
      }
      .lvl {
        display: flex;
        gap: 1px;
        height: 18px;
        align-items: center;
      }
      .lvl span {
        flex: 1;
        background: var(--bg-surface-3);
        height: 100%;
        border-radius: 1px;
      }
      .lvl span.on {
        background: var(--success);
      }
    </style>
  </head>
  <body>
    <div class="composer">
      <div class="mic-row">
        <div class="mic">
          <span class="material-symbols-outlined" style="font-size: 18px"
            >mic</span
          >
        </div>
        <div class="wave">
          <span></span><span></span><span></span><span></span><span></span
          ><span></span><span></span><span></span><span></span><span></span
          ><span></span><span></span><span></span><span></span><span></span
          ><span></span><span></span><span></span><span></span><span></span>
        </div>
        <span class="time">0:08</span>
        <button class="stop">
          <span class="material-symbols-outlined" style="font-size: 16px"
            >stop</span
          >
        </button>
      </div>
      <div class="hint">
        Recording &middot; release space-bar or tap stop &middot;
        <b>af_heart</b> will transcribe
      </div>
    </div>

    <div class="idle">
      <div class="row1">
        <div class="mic-ico">
          <span class="material-symbols-outlined" style="font-size: 20px"
            >mic</span
          >
        </div>
        <div>
          <div class="ttl">Microphone ready</div>
          <div class="sub">
            Hold
            <code
              style="
                font-family: var(--font-mono);
                background: var(--bg-surface-3);
                color: var(--aurora-300);
                padding: 1px 5px;
                border-radius: 3px;
              "
              >Space</code
            >
            to talk
          </div>
        </div>
      </div>
      <div class="lvl">
        <span class="on"></span><span class="on"></span><span class="on"></span
        ><span class="on"></span><span class="on"></span><span class="on"></span
        ><span class="on"></span><span class="on"></span><span class="on"></span
        ><span></span><span></span><span></span><span></span><span></span
        ><span></span><span></span><span></span><span></span><span></span
        ><span></span><span></span><span></span><span></span><span></span
        ><span></span><span></span><span></span><span></span><span></span
        ><span></span><span></span><span></span>
      </div>
    </div>
  </body>
</html>
