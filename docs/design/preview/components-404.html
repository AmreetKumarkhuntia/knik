<!doctype html>
<!-- @dsCard group="Components" name="404 page" subtitle="Aurora-gradient 404 with recovery actions" viewport="700x240" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 22px 28px;
        background: var(--bg-base);
        background-image: radial-gradient(
          at 50% 30%,
          rgba(0, 217, 244, 0.1) 0px,
          transparent 60%
        );
        box-sizing: border-box;
        display: flex;
        gap: 30px;
        align-items: center;
      }
      .four {
        font-family: var(--font-display);
        font-size: 120px;
        font-weight: 600;
        letter-spacing: -0.08em;
        line-height: 0.95;
        color: var(--fg-1);
        background: linear-gradient(
          180deg,
          var(--aurora-300) 0%,
          var(--teal-400) 60%,
          var(--fg-3) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow: 0 4px 30px rgba(0, 217, 244, 0.3);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: var(--fg-1);
      }
      p {
        margin: 0 0 14px;
        color: var(--fg-3);
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--border-2);
        background: var(--bg-surface-2);
        color: var(--fg-1);
        text-decoration: none;
      }
      .btn.primary {
        background: var(--aurora-400);
        color: var(--on-primary);
        border-color: rgba(0, 0, 0, 0.2);
        box-shadow: 0 4px 14px -4px rgba(0, 217, 244, 0.55);
      }
      .url {
        margin-top: 14px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-4);
      }
      .url code {
        background: var(--bg-code);
        color: var(--aurora-300);
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--border-1);
      }
    </style>
  </head>
  <body>
    <div class="four">404</div>
    <div>
      <h2>That workflow doesn't exist.</h2>
      <p>It may have been deleted, or the URL is mistyped.</p>
      <div class="row">
        <a class="btn primary" href="#"
          ><span class="material-symbols-outlined" style="font-size: 16px"
            >home</span
          >Back home</a
        >
        <a class="btn" href="#"
          ><span class="material-symbols-outlined" style="font-size: 16px"
            >history</span
          >View recent</a
        >
      </div>
      <div class="url">tried <code>/workflows/wf-9a-99</code></div>
    </div>
  </body>
</html>
