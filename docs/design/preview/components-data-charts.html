<!doctype html>
<!-- @dsCard group="Components" name="Data charts" subtitle="Sparkline, bar chart, donut composition" viewport="700x320" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 24px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .card {
        background: var(--bg-surface-2);
        border: 1px solid var(--border-2);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .ttl {
        font-size: 12px;
        color: var(--fg-3);
      }
      .val {
        font-family: var(--font-mono);
        font-size: 22px;
        font-weight: 600;
        color: var(--fg-1);
        letter-spacing: -0.02em;
      }
      .delta {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--success);
      }
      svg {
        display: block;
        width: 100%;
        height: 64px;
      }
      .ax {
        font-family: var(--font-mono);
        font-size: 9px;
        fill: var(--fg-5);
      }
      .bar {
        fill: var(--aurora-400);
      }
      .bar.dim {
        fill: var(--bg-surface-3);
      }
    </style>
  </head>
  <body>
    <!-- Sparkline -->
    <div class="card">
      <div class="head">
        <span class="ttl">Executions · 24h</span>
        <span class="delta">↑ +18.3%</span>
      </div>
      <div class="val">1,247</div>
      <svg viewBox="0 0 280 64" preserveAspectRatio="none">
        <defs>
          <linearGradient
            id="sp"
            x1="0"
            y1="0"
            x2="0"
            y2="64"
            gradientUnits="userSpaceOnUse"
          >
            <stop offset="0%" stop-color="#00d9f4" stop-opacity="0.45" />
            <stop offset="100%" stop-color="#00d9f4" stop-opacity="0" />
          </linearGradient>
        </defs>
        <path
          d="M0,48 L20,42 L40,46 L60,30 L80,36 L100,22 L120,28 L140,18 L160,24 L180,14 L200,20 L220,12 L240,18 L260,8 L280,12 L280,64 L0,64 Z"
          fill="url(#sp)"
        />
        <path
          d="M0,48 L20,42 L40,46 L60,30 L80,36 L100,22 L120,28 L140,18 L160,24 L180,14 L200,20 L220,12 L240,18 L260,8 L280,12"
          stroke="#00d9f4"
          stroke-width="1.5"
          fill="none"
        />
        <circle cx="280" cy="12" r="3" fill="#00d9f4" />
        <circle cx="280" cy="12" r="7" fill="#00d9f4" opacity="0.25" />
      </svg>
    </div>

    <!-- Bar chart -->
    <div class="card">
      <div class="head">
        <span class="ttl">By workflow · 7d</span>
        <span class="delta" style="color: var(--fg-4)">Top 6</span>
      </div>
      <svg viewBox="0 0 280 100" preserveAspectRatio="none">
        <!-- bars: x, h -->
        <rect x="0" y="20" width="38" height="80" rx="3" class="bar" />
        <rect x="46" y="38" width="38" height="62" rx="3" class="bar" />
        <rect x="92" y="56" width="38" height="44" rx="3" class="bar" />
        <rect x="138" y="64" width="38" height="36" rx="3" class="bar dim" />
        <rect x="184" y="74" width="38" height="26" rx="3" class="bar dim" />
        <rect x="230" y="84" width="38" height="16" rx="3" class="bar dim" />
      </svg>
      <div style="display: flex; justify-content: space-between">
        <span class="ax">digest</span>
        <span class="ax">inbox</span>
        <span class="ax">voice</span>
        <span class="ax">code</span>
        <span class="ax">gh</span>
        <span class="ax">misc</span>
      </div>
    </div>

    <!-- Donut -->
    <div
      class="card"
      style="
        grid-column: span 2;
        flex-direction: row;
        align-items: center;
        gap: 20px;
      "
    >
      <svg viewBox="0 0 120 120" style="width: 120px; height: 120px">
        <circle
          cx="60"
          cy="60"
          r="46"
          fill="none"
          stroke="var(--bg-surface-3)"
          stroke-width="14"
        />
        <circle
          cx="60"
          cy="60"
          r="46"
          fill="none"
          stroke="#10b981"
          stroke-width="14"
          stroke-dasharray="248 289"
          stroke-dashoffset="0"
          transform="rotate(-90 60 60)"
          stroke-linecap="round"
        />
        <circle
          cx="60"
          cy="60"
          r="46"
          fill="none"
          stroke="#f59e0b"
          stroke-width="14"
          stroke-dasharray="24 289"
          stroke-dashoffset="-248"
          transform="rotate(-90 60 60)"
          stroke-linecap="round"
        />
        <circle
          cx="60"
          cy="60"
          r="46"
          fill="none"
          stroke="#ef4444"
          stroke-width="14"
          stroke-dasharray="14 289"
          stroke-dashoffset="-272"
          transform="rotate(-90 60 60)"
          stroke-linecap="round"
        />
        <text
          x="60"
          y="58"
          text-anchor="middle"
          fill="var(--fg-1)"
          font-family="Inter"
          font-size="22"
          font-weight="600"
        >
          98.4%
        </text>
        <text
          x="60"
          y="76"
          text-anchor="middle"
          fill="var(--fg-4)"
          font-family="JetBrains Mono"
          font-size="9"
        >
          success
        </text>
      </svg>
      <div style="display: flex; flex-direction: column; gap: 8px; flex: 1">
        <div style="display: flex; align-items: center; gap: 8px">
          <span
            style="
              width: 8px;
              height: 8px;
              border-radius: 50%;
              background: #10b981;
            "
          ></span
          ><span style="font-size: 12px; color: var(--fg-2)">Success</span
          ><span
            style="
              margin-left: auto;
              font-family: var(--font-mono);
              font-size: 11px;
              color: var(--fg-3);
            "
            >1,225</span
          >
        </div>
        <div style="display: flex; align-items: center; gap: 8px">
          <span
            style="
              width: 8px;
              height: 8px;
              border-radius: 50%;
              background: #f59e0b;
            "
          ></span
          ><span style="font-size: 12px; color: var(--fg-2)">Pending</span
          ><span
            style="
              margin-left: auto;
              font-family: var(--font-mono);
              font-size: 11px;
              color: var(--fg-3);
            "
          >
            14</span
          >
        </div>
        <div style="display: flex; align-items: center; gap: 8px">
          <span
            style="
              width: 8px;
              height: 8px;
              border-radius: 50%;
              background: #ef4444;
            "
          ></span
          ><span style="font-size: 12px; color: var(--fg-2)">Failed</span
          ><span
            style="
              margin-left: auto;
              font-family: var(--font-mono);
              font-size: 11px;
              color: var(--fg-3);
            "
          >
            8</span
          >
        </div>
      </div>
    </div>
  </body>
</html>
