<!doctype html>
<!-- @dsCard group="Components" name="Data table" subtitle="Sortable, checkable rows with status pills" viewport="700x220" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 0;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        text-align: left;
        padding: 10px 16px;
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--fg-4);
        background: var(--bg-surface-2);
        border-bottom: 1px solid var(--border-2);
      }
      th.r {
        text-align: right;
      }
      td {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-1);
        color: var(--fg-2);
        vertical-align: middle;
      }
      td.r {
        text-align: right;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--bg-surface-3);
      }
      tr.selected td {
        background: rgba(0, 217, 244, 0.06);
      }
      .mono {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--fg-3);
      }
      .id {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--aurora-300);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
      }
      .badge.s {
        background: rgba(16, 185, 129, 0.16);
        color: #10b981;
      }
      .badge.r {
        background: rgba(0, 217, 244, 0.16);
        color: var(--aurora-300);
      }
      .badge.f {
        background: rgba(239, 68, 68, 0.16);
        color: #ef4444;
      }
      .badge .d {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .check {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1.5px solid var(--border-3);
        background: var(--bg-surface-2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .check.on {
        background: var(--aurora-400);
        border-color: var(--aurora-400);
      }
      .check.on::after {
        content: "";
        width: 8px;
        height: 4px;
        border-left: 1.5px solid var(--on-primary);
        border-bottom: 1.5px solid var(--on-primary);
        transform: rotate(-45deg) translateY(-2px);
      }
      .sort {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th style="width: 32px"><span class="check"></span></th>
          <th style="width: 90px">ID</th>
          <th>
            <span class="sort"
              >Workflow
              <span class="material-symbols-outlined" style="font-size: 12px"
                >arrow_drop_down</span
              ></span
            >
          </th>
          <th style="width: 100px">Status</th>
          <th class="r" style="width: 90px">Duration</th>
          <th class="r" style="width: 110px">Started</th>
        </tr>
      </thead>
      <tbody>
        <tr class="selected">
          <td><span class="check on"></span></td>
          <td><span class="id">ex-9210</span></td>
          <td>Daily digest</td>
          <td>
            <span class="badge s"><span class="d"></span>Success</span>
          </td>
          <td class="r mono">12.4 s</td>
          <td class="r mono">12:41:08</td>
        </tr>
        <tr>
          <td><span class="check"></span></td>
          <td><span class="id">ex-9209</span></td>
          <td>Summarise inbox</td>
          <td>
            <span class="badge s"><span class="d"></span>Success</span>
          </td>
          <td class="r mono">8.1 s</td>
          <td class="r mono">12:38:52</td>
        </tr>
        <tr>
          <td><span class="check"></span></td>
          <td><span class="id">ex-9208</span></td>
          <td>Voice notes → tasks</td>
          <td>
            <span class="badge r"
              ><span
                style="
                  width: 9px;
                  height: 9px;
                  border: 1.5px solid currentColor;
                  border-top-color: transparent;
                  border-radius: 50%;
                  animation: knik-spin 0.9s linear infinite;
                  display: inline-block;
                "
              ></span
              >Running</span
            >
          </td>
          <td class="r mono">—</td>
          <td class="r mono">12:37:14</td>
        </tr>
        <tr>
          <td><span class="check"></span></td>
          <td><span class="id">ex-9207</span></td>
          <td>GitHub digest</td>
          <td>
            <span class="badge f"><span class="d"></span>Failed</span>
          </td>
          <td class="r mono">4.7 s</td>
          <td class="r mono">12:31:09</td>
        </tr>
      </tbody>
    </table>
    <style>
      @keyframes knik-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </body>
</html>
