<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="Success / Running / Pending / Failed" viewport="700x160" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 24px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .tile {
        border-radius: 10px;
        border: 1px solid;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .badge {
        align-self: flex-start;
        padding: 4px 10px;
        border-radius: 999px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .hex {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
      }
      .label {
        font-size: 12px;
        color: var(--fg-2);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div
        class="tile"
        style="
          background: rgba(16, 185, 129, 0.1);
          border-color: rgba(16, 185, 129, 0.3);
        "
      >
        <span
          class="badge"
          style="background: rgba(16, 185, 129, 0.2); color: #10b981"
          >Success</span
        >
        <span class="label">Run completed</span>
        <span class="hex">#10B981</span>
      </div>
      <div
        class="tile"
        style="
          background: rgba(59, 130, 246, 0.1);
          border-color: rgba(59, 130, 246, 0.3);
        "
      >
        <span
          class="badge"
          style="background: rgba(59, 130, 246, 0.2); color: #3b82f6"
          >Running</span
        >
        <span class="label">In progress</span>
        <span class="hex">#3B82F6</span>
      </div>
      <div
        class="tile"
        style="
          background: rgba(245, 158, 11, 0.1);
          border-color: rgba(245, 158, 11, 0.3);
        "
      >
        <span
          class="badge"
          style="background: rgba(245, 158, 11, 0.2); color: #f59e0b"
          >Pending</span
        >
        <span class="label">Queued</span>
        <span class="hex">#F59E0B</span>
      </div>
      <div
        class="tile"
        style="
          background: rgba(239, 68, 68, 0.1);
          border-color: rgba(239, 68, 68, 0.3);
        "
      >
        <span
          class="badge"
          style="background: rgba(239, 68, 68, 0.2); color: #ef4444"
          >Failed</span
        >
        <span class="label">Error · retry</span>
        <span class="hex">#EF4444</span>
      </div>
    </div>
  </body>
</html>
