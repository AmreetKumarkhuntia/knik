<!doctype html>
<!-- @dsCard group="Components" name="Area chart" subtitle="Trend chart with legend and tabular figures" viewport="700x220" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 24px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
        display: flex;
        gap: 20px;
        align-items: center;
      }
      .left {
        flex: 1;
      }
      .lab {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      .num {
        font-family: var(--font-mono);
        font-size: 28px;
        color: var(--fg-1);
        letter-spacing: -0.025em;
        font-weight: 600;
      }
      .num small {
        font-size: 14px;
        color: var(--fg-4);
        font-weight: 400;
        margin-left: 4px;
      }
      .delta {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--success);
        margin-top: 2px;
      }
      .legend {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        color: var(--fg-3);
      }
      .item .d {
        width: 8px;
        height: 8px;
        border-radius: 2px;
      }
      .item .v {
        color: var(--fg-1);
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body>
    <div class="left">
      <div class="lab">Daily executions</div>
      <div class="num">12,847 <small>/ day</small></div>
      <div class="delta">↑ +5.2% week-over-week</div>
      <div class="legend">
        <div class="item">
          <span class="d" style="background: #10b981"></span>Success
          <span class="v">12,654</span>
        </div>
        <div class="item">
          <span class="d" style="background: #f59e0b"></span>Pending
          <span class="v">141</span>
        </div>
        <div class="item">
          <span class="d" style="background: #ef4444"></span>Failed
          <span class="v">52</span>
        </div>
      </div>
    </div>

    <svg viewBox="0 0 320 160" style="width: 320px; height: 160px">
      <defs>
        <linearGradient
          id="ar"
          x1="0"
          y1="0"
          x2="0"
          y2="160"
          gradientUnits="userSpaceOnUse"
        >
          <stop offset="0%" stop-color="#00d9f4" stop-opacity="0.40" />
          <stop offset="100%" stop-color="#00d9f4" stop-opacity="0" />
        </linearGradient>
      </defs>
      <!-- horizontal grid -->
      <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
        <line x1="0" y1="20" x2="320" y2="20" />
        <line x1="0" y1="60" x2="320" y2="60" />
        <line x1="0" y1="100" x2="320" y2="100" />
        <line x1="0" y1="140" x2="320" y2="140" />
      </g>
      <!-- area -->
      <path
        d="M0,120 C30,118 40,90 70,85 C110,78 130,100 160,72 C190,46 210,58 240,38 C265,22 285,52 320,30 L320,160 L0,160 Z"
        fill="url(#ar)"
      />
      <!-- line -->
      <path
        d="M0,120 C30,118 40,90 70,85 C110,78 130,100 160,72 C190,46 210,58 240,38 C265,22 285,52 320,30"
        stroke="#00d9f4"
        stroke-width="2"
        fill="none"
      />
      <!-- dots -->
      <g fill="#00d9f4">
        <circle cx="70" cy="85" r="2.5" />
        <circle cx="160" cy="72" r="2.5" />
        <circle cx="240" cy="38" r="2.5" />
        <circle cx="320" cy="30" r="3.5" />
        <circle cx="320" cy="30" r="7" fill="#00d9f4" opacity="0.22" />
      </g>
      <!-- axis labels -->
      <g
        font-family="JetBrains Mono"
        font-size="9"
        fill="rgba(255,255,255,0.45)"
      >
        <text x="0" y="155">Mon</text>
        <text x="56" y="155">Tue</text>
        <text x="112" y="155">Wed</text>
        <text x="168" y="155">Thu</text>
        <text x="224" y="155">Fri</text>
        <text x="278" y="155">Sat</text>
        <text x="308" y="155" text-anchor="end">Sun</text>
      </g>
    </svg>
  </body>
</html>
