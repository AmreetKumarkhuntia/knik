<!doctype html>
<!-- @dsCard group="Components" name="Suggestion cards" subtitle="Welcome prompt cards · hover & default" viewport="700x200" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 22px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .card {
        background: var(--bg-surface-2);
        border: 1px solid var(--border-2);
        border-radius: 12px;
        padding: 14px 14px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        cursor: pointer;
        transition: all 200ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .card:hover,
      .card.hover {
        border-color: rgba(0, 217, 244, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 10px 28px -12px rgba(0, 217, 244, 0.45);
      }
      .ico {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: rgba(0, 217, 244, 0.12);
        color: var(--aurora-300);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        color: var(--fg-1);
        letter-spacing: -0.012em;
      }
      .sub {
        font-size: 12px;
        color: var(--fg-3);
        margin-top: 2px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card hover">
        <div class="ico">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="16 18 22 12 16 6" />
            <polyline points="8 6 2 12 8 18" />
          </svg>
        </div>
        <div>
          <div class="title">Refactor my Python script</div>
          <div class="sub">Optimize performance and readability</div>
        </div>
      </div>

      <div class="card">
        <div class="ico">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </div>
        <div>
          <div class="title">Write a blog post outline</div>
          <div class="sub">On future of AI in healthcare</div>
        </div>
      </div>

      <div class="card">
        <div class="ico">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="8" y="3" width="8" height="6" rx="1" />
            <path d="M5 14h14M12 14v8M9 9v3a3 3 0 003 3M15 9v3a3 3 0 01-3 3" />
          </svg>
        </div>
        <div>
          <div class="title">Debug my React component</div>
          <div class="sub">Fix state management issues</div>
        </div>
      </div>

      <div class="card">
        <div class="ico">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <path d="M8 13h8M8 17h6" />
          </svg>
        </div>
        <div>
          <div class="title">Create API documentation</div>
          <div class="sub">For REST endpoints</div>
        </div>
      </div>
    </div>
  </body>
</html>
