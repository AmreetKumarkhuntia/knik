<!doctype html>
<!-- @dsCard group="Components" name="Schedule list" subtitle="Cron schedules with next-run + paused state" viewport="700x260" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 22px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .sched {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        background: var(--bg-surface-2);
        border: 1px solid var(--border-2);
        border-radius: 12px;
      }
      .sched.next {
        border-color: rgba(0, 217, 244, 0.3);
        background: rgba(0, 217, 244, 0.04);
        box-shadow: 0 0 0 3px rgba(0, 217, 244, 0.08);
      }
      .ico {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: rgba(0, 217, 244, 0.1);
        color: var(--aurora-300);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sched.paused .ico {
        background: var(--bg-surface-3);
        color: var(--fg-4);
      }
      .info {
        flex: 1;
        min-width: 0;
      }
      .name {
        font-size: 14px;
        font-weight: 600;
        color: var(--fg-1);
        letter-spacing: -0.012em;
      }
      .meta {
        display: flex;
        gap: 14px;
        margin-top: 3px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-3);
      }
      .meta b {
        color: var(--aurora-300);
        font-weight: 400;
      }
      .cron {
        font-family: var(--font-mono);
        font-size: 11.5px;
        background: var(--bg-code);
        color: var(--fg-1);
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--border-1);
      }
      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        background: var(--bg-surface-3);
        border: 1px solid var(--border-2);
        border-radius: 999px;
        flex-shrink: 0;
      }
      .toggle.on {
        background: var(--aurora-400);
        border-color: var(--aurora-400);
      }
      .toggle::after {
        content: "";
        position: absolute;
        top: 1px;
        left: 1px;
        width: 16px;
        height: 16px;
        background: var(--fg-3);
        border-radius: 50%;
        transition: 200ms var(--ease-out);
      }
      .toggle.on::after {
        left: 17px;
        background: var(--on-primary);
      }
      .actions {
        display: flex;
        gap: 2px;
      }
      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        color: var(--fg-3);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .icon-btn:hover {
        background: var(--bg-surface-3);
        color: var(--fg-1);
      }
    </style>
  </head>
  <body>
    <div class="sched next">
      <div class="ico">
        <span class="material-symbols-outlined" style="font-size: 20px"
          >schedule</span
        >
      </div>
      <div class="info">
        <div class="name">Daily digest</div>
        <div class="meta">
          <span><span class="cron">0 9 * * *</span></span>
          <span>Next · <b>Tomorrow 09:00 UTC</b></span>
          <span>1,247 runs</span>
        </div>
      </div>
      <div class="toggle on"></div>
      <div class="actions">
        <span class="icon-btn"
          ><span class="material-symbols-outlined" style="font-size: 18px"
            >edit</span
          ></span
        >
        <span class="icon-btn"
          ><span class="material-symbols-outlined" style="font-size: 18px"
            >delete</span
          ></span
        >
      </div>
    </div>

    <div class="sched">
      <div class="ico">
        <span class="material-symbols-outlined" style="font-size: 20px"
          >schedule</span
        >
      </div>
      <div class="info">
        <div class="name">Summarise inbox</div>
        <div class="meta">
          <span><span class="cron">*/15 * * * *</span></span>
          <span>Next · <b>in 6 min</b></span>
          <span>582 runs</span>
        </div>
      </div>
      <div class="toggle on"></div>
      <div class="actions">
        <span class="icon-btn"
          ><span class="material-symbols-outlined" style="font-size: 18px"
            >edit</span
          ></span
        >
        <span class="icon-btn"
          ><span class="material-symbols-outlined" style="font-size: 18px"
            >delete</span
          ></span
        >
      </div>
    </div>

    <div class="sched paused">
      <div class="ico">
        <span class="material-symbols-outlined" style="font-size: 20px"
          >pause</span
        >
      </div>
      <div class="info">
        <div class="name">Code review bot</div>
        <div class="meta">
          <span><span class="cron">0 */4 * * *</span></span>
          <span style="color: var(--fg-4)">Paused</span>
          <span>97 runs</span>
        </div>
      </div>
      <div class="toggle"></div>
      <div class="actions">
        <span class="icon-btn"
          ><span class="material-symbols-outlined" style="font-size: 18px"
            >edit</span
          ></span
        >
        <span class="icon-btn"
          ><span class="material-symbols-outlined" style="font-size: 18px"
            >delete</span
          ></span
        >
      </div>
    </div>
  </body>
</html>
