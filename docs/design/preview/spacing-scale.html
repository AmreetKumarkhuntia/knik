<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 → 64px on a 4-pt base" viewport="700x340" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 22px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 9px;
      }
      .row:last-child {
        margin-bottom: 0;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-3);
        width: 96px;
      }
      .bar {
        background: linear-gradient(90deg, var(--aurora-400), var(--teal-500));
        height: 10px;
        border-radius: 2px;
      }
      .val {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-4);
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="label">--space-1</span>
      <div class="bar" style="width: 4px"></div>
      <span class="val">4 px</span>
    </div>
    <div class="row">
      <span class="label">--space-2</span>
      <div class="bar" style="width: 8px"></div>
      <span class="val">8 px</span>
    </div>
    <div class="row">
      <span class="label">--space-3</span>
      <div class="bar" style="width: 12px"></div>
      <span class="val">12 px</span>
    </div>
    <div class="row">
      <span class="label">--space-4</span>
      <div class="bar" style="width: 16px"></div>
      <span class="val">16 px</span>
    </div>
    <div class="row">
      <span class="label">--space-5</span>
      <div class="bar" style="width: 20px"></div>
      <span class="val">20 px</span>
    </div>
    <div class="row">
      <span class="label">--space-6</span>
      <div class="bar" style="width: 24px"></div>
      <span class="val">24 px</span>
    </div>
    <div class="row">
      <span class="label">--space-8</span>
      <div class="bar" style="width: 32px"></div>
      <span class="val">32 px</span>
    </div>
    <div class="row">
      <span class="label">--space-10</span>
      <div class="bar" style="width: 40px"></div>
      <span class="val">40 px</span>
    </div>
    <div class="row">
      <span class="label">--space-12</span>
      <div class="bar" style="width: 48px"></div>
      <span class="val">48 px</span>
    </div>
    <div class="row">
      <span class="label">--space-16</span>
      <div class="bar" style="width: 64px"></div>
      <span class="val">64 px</span>
    </div>
  </body>
</html>
