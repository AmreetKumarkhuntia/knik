<!doctype html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="20 Material Symbols Outlined used by the app" viewport="700x200" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 24px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 10px;
      }
      .ico {
        height: 44px;
        border-radius: 8px;
        border: 1px solid var(--border-2);
        background: var(--bg-surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--fg-2);
        transition: all 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .ico:hover {
        color: var(--aurora-300);
        border-color: rgba(0, 217, 244, 0.4);
      }
      .ico .ms {
        font-size: 22px;
      }
      .legend {
        margin-top: 14px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-3);
        display: flex;
        justify-content: space-between;
      }
      .legend b {
        color: var(--fg-1);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="ico">
        <span class="material-symbols-outlined ms">chat</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">add_comment</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">account_tree</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">smart_toy</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">auto_awesome</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">bolt</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">check_circle</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">trending_up</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">settings</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">delete</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">edit</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">play_arrow</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">pause</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">stop</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">mic</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">attach_file</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">send</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">search</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">tune</span>
      </div>
      <div class="ico">
        <span class="material-symbols-outlined ms">history</span>
      </div>
    </div>
    <div class="legend">
      <span>Material Symbols Outlined · <b>wght 400 · opsz 24</b></span>
      <span>via Google Fonts CDN</span>
    </div>
  </body>
</html>
