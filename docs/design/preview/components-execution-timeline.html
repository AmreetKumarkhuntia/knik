<!doctype html>
<!-- @dsCard group="Components" name="Execution timeline" subtitle="Vertical step timeline with inline error block" viewport="700x320" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 22px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .step {
        position: relative;
        padding-left: 36px;
        padding-bottom: 12px;
      }
      .step:last-child {
        padding-bottom: 0;
      }
      .step:not(:last-child)::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 24px;
        bottom: 0;
        width: 2px;
        background: var(--border-2);
      }
      .step.success:not(:last-child)::before {
        background: rgba(16, 185, 129, 0.4);
      }
      .dot {
        position: absolute;
        left: 0;
        top: 2px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .dot.success {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }
      .dot.failed {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }
      .dot.pending {
        background: rgba(59, 130, 246, 0.2);
        color: #3b82f6;
      }
      .body {
        background: var(--bg-surface-2);
        border: 1px solid var(--border-2);
        border-radius: 10px;
        padding: 10px 14px;
      }
      .body.failed {
        border-color: rgba(239, 68, 68, 0.3);
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .name {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--fg-1);
        letter-spacing: -0.012em;
      }
      .meta {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-3);
      }
      .dur {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-4);
      }
      .err {
        margin-top: 6px;
        padding: 6px 8px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        background: rgba(239, 68, 68, 0.08);
        color: #ef4444;
        border-radius: 6px;
        font-family: var(--font-mono);
        font-size: 11px;
      }
      .summary {
        margin-top: 8px;
        font-size: 11px;
        color: var(--aurora-300);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <div class="step success">
      <span class="dot success"
        ><span class="material-symbols-outlined" style="font-size: 14px"
          >check</span
        ></span
      >
      <div class="body">
        <div class="top">
          <div style="display: flex; align-items: center; gap: 8px">
            <span
              class="material-symbols-outlined"
              style="font-size: 16px; color: var(--fg-3)"
              >bolt</span
            >
            <span class="name">fetch_sources</span>
            <span class="meta">action</span>
          </div>
          <span class="dur">142 ms</span>
        </div>
        <div class="summary">View inputs / outputs &nbsp;▾</div>
      </div>
    </div>
    <div class="step success">
      <span class="dot success"
        ><span class="material-symbols-outlined" style="font-size: 14px"
          >check</span
        ></span
      >
      <div class="body">
        <div class="top">
          <div style="display: flex; align-items: center; gap: 8px">
            <span
              class="material-symbols-outlined"
              style="font-size: 16px; color: var(--fg-3)"
              >smart_toy</span
            >
            <span class="name">summarise</span>
            <span class="meta">llm · gemini-1.5-flash</span>
          </div>
          <span class="dur">6.2 s</span>
        </div>
      </div>
    </div>
    <div class="step failed">
      <span class="dot failed"
        ><span class="material-symbols-outlined" style="font-size: 14px"
          >close</span
        ></span
      >
      <div class="body failed">
        <div class="top">
          <div style="display: flex; align-items: center; gap: 8px">
            <span
              class="material-symbols-outlined"
              style="font-size: 16px; color: var(--fg-3)"
              >send</span
            >
            <span class="name">email_digest</span>
            <span class="meta">action</span>
          </div>
          <span class="dur">4.7 s</span>
        </div>
        <div class="err">
          SMTPError: 550 5.7.1 Relay denied — check sender domain
        </div>
      </div>
    </div>
  </body>
</html>
