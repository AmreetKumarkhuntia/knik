<!doctype html>
<!-- @dsCard group="Type" name="Monospace" subtitle="JetBrains Mono inline and block usage" viewport="700x200" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 24px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
        color: var(--fg-2);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 14px;
      }
      .row:last-child {
        margin-bottom: 0;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-4);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        width: 100px;
      }
      .block {
        background: var(--bg-code);
        border: 1px solid var(--border-1);
        border-radius: 8px;
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--fg-2);
        letter-spacing: -0.01em;
      }
      .kw {
        color: var(--aurora-300);
      }
      .str {
        color: var(--teal-300);
      }
      .num {
        color: #f59e0b;
      }
      .com {
        color: var(--fg-4);
      }
      .inline-mono {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--aurora-300);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="label">mono · inline</span>
      <span class="inline-mono"
        >af_heart · am_michael · gemini-1.5-flash · 12.4s</span
      >
    </div>
    <div class="row" style="align-items: flex-start">
      <span class="label">mono · block</span>
      <div class="block" style="flex: 1">
        <span class="com">// run a workflow</span><br />
        <span class="kw">const</span> result =
        <span class="kw">await</span> knik.run(<span class="str"
          >"daily-digest"</span
        >, { depth: <span class="num">3</span> });
      </div>
    </div>
    <div class="row" style="margin-top: 6px">
      <span class="label">family</span>
      <span
        style="
          font-size: 12px;
          color: var(--fg-4);
          font-family: var(--font-mono);
        "
        >JetBrains Mono · 400 / 500 / 600 · tracking &minus;0.01em</span
      >
    </div>
  </body>
</html>
