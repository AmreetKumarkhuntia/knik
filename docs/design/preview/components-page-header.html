<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 0;
        background: var(--bg-base);
        box-sizing: border-box;
      }
      .header {
        height: 64px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-glass);
        backdrop-filter: blur(20px) saturate(140%);
        border-bottom: 1px solid var(--border-2);
      }
      .crumbs {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .crumb {
        color: var(--fg-4);
        letter-spacing: -0.012em;
      }
      .crumb.last {
        color: var(--fg-1);
        font-weight: 600;
      }
      .sep {
        color: var(--fg-5);
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ghost {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--fg-3);
        background: transparent;
        border: none;
        cursor: pointer;
        position: relative;
      }
      .badge {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--aurora-400);
        box-shadow: 0 0 6px var(--aurora-400);
      }
      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--aurora-400), var(--teal-500));
        color: var(--on-primary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        margin-left: 4px;
      }
      .cta {
        font-size: 12.5px;
        font-weight: 500;
        padding: 7px 12px;
        border-radius: 7px;
        background: var(--aurora-400);
        color: var(--on-primary);
        border: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 4px 14px -4px rgba(0, 217, 244, 0.55);
      }
      .body {
        padding: 16px 28px 22px;
        color: var(--fg-3);
        font-size: 12px;
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <nav class="crumbs">
        <span class="crumb">Workflows</span>
        <span class="sep">/</span>
        <span class="crumb">Builder</span>
        <span class="sep">/</span>
        <span class="crumb last">Daily digest</span>
      </nav>
      <div class="actions">
        <button class="cta">
          <span class="material-symbols-outlined" style="font-size: 16px"
            >play_arrow</span
          >Run
        </button>
        <button class="ghost">
          <span class="material-symbols-outlined" style="font-size: 18px"
            >notifications</span
          ><span class="badge"></span>
        </button>
        <button class="ghost">
          <span class="material-symbols-outlined" style="font-size: 18px"
            >settings</span
          >
        </button>
        <div class="avatar">AR</div>
      </div>
    </header>
    <div class="body">sticky · glass · 64px tall · 1px hairline bottom</div>
  </body>
</html>
