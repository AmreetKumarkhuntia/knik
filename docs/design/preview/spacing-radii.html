<!doctype html>
<!-- @dsCard group="Spacing" name="Border radii" subtitle="xs (4) → pill (999)" viewport="700x160" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 26px 28px;
        background: var(--bg-surface);
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .shape {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--aurora-400), var(--teal-500));
        border: 1px solid var(--border-2);
      }
      .name {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-2);
      }
      .val {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item">
        <div class="shape" style="border-radius: 4px"></div>
        <span class="name">xs</span><span class="val">4 px</span>
      </div>
      <div class="item">
        <div class="shape" style="border-radius: 6px"></div>
        <span class="name">sm</span><span class="val">6 px</span>
      </div>
      <div class="item">
        <div class="shape" style="border-radius: 8px"></div>
        <span class="name">md</span><span class="val">8 px · btn</span>
      </div>
      <div class="item">
        <div class="shape" style="border-radius: 12px"></div>
        <span class="name">lg</span><span class="val">12 px · card</span>
      </div>
      <div class="item">
        <div class="shape" style="border-radius: 16px"></div>
        <span class="name">xl</span><span class="val">16 px · modal</span>
      </div>
      <div class="item">
        <div class="shape" style="border-radius: 20px"></div>
        <span class="name">2xl</span><span class="val">20 px</span>
      </div>
      <div class="item">
        <div class="shape" style="border-radius: 999px"></div>
        <span class="name">pill</span><span class="val">999 px</span>
      </div>
    </div>
  </body>
</html>
