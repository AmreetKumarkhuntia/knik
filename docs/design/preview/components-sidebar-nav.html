<!doctype html>
<!-- @dsCard group="Components" name="Sidebar nav" subtitle="Glass nav with active + hover annotations" viewport="700x320" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        width: 700px;
        padding: 0;
        background: var(--bg-surface);
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 320px;
      }
      .side {
        background: var(--bg-glass);
        backdrop-filter: blur(20px) saturate(140%);
        border-right: 1px solid var(--border-2);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 10px 14px;
      }
      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(
          135deg,
          rgba(0, 217, 244, 0.18),
          rgba(20, 184, 166, 0.18)
        );
        border: 1px solid rgba(0, 217, 244, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--aurora-300);
      }
      .brand-name {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--fg-1);
      }
      .section-label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 6px 12px;
        margin-top: 4px;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 8px;
        color: var(--fg-3);
        font-size: 14px;
        cursor: pointer;
      }
      .item:hover {
        background: var(--bg-surface-3);
        color: var(--fg-1);
      }
      .item.active {
        background: rgba(0, 217, 244, 0.12);
        color: var(--aurora-200);
      }
      .item svg {
        width: 18px;
        height: 18px;
      }
      .right {
        padding: 22px;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(0, 217, 244, 0.04) 100%
        );
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .annotation {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-4);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .annotation b {
        color: var(--aurora-300);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="side">
      <div class="brand">
        <div class="brand-mark">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linecap="round"
          >
            <line x1="6" y1="12" x2="6" y2="12" />
            <line x1="9" y1="9" x2="9" y2="15" />
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="15" y1="8" x2="15" y2="16" />
            <line x1="18" y1="10" x2="18" y2="14" />
          </svg>
        </div>
        <span class="brand-name">Knik AI</span>
      </div>
      <div class="item">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M12 5v14M5 12h14" stroke-linecap="round" />
        </svg>
        New chat
      </div>
      <div class="section-label">Navigation</div>
      <div class="item active">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        Chat
      </div>
      <div class="item">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="6" cy="6" r="2" />
          <circle cx="18" cy="6" r="2" />
          <circle cx="12" cy="18" r="2" />
          <path d="M6 8v3a2 2 0 002 2h8a2 2 0 002-2V8M12 13v3" />
        </svg>
        Workflows
      </div>
    </div>
    <div class="right">
      <div class="annotation">
        <b>Hover</b> → background: surface-3 · color: fg-1
      </div>
      <div class="annotation">
        <b>Active</b> → bg: primary-soft · color: aurora-200
      </div>
      <div class="annotation">
        <b>Width</b> → 80 collapsed · 320 expanded · spring
      </div>
      <div class="annotation"><b>Surface</b> → glass · backdrop-blur 20px</div>
    </div>
  </body>
</html>
