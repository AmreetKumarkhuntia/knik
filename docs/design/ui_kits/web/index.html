<!doctype html>
<!-- @dsCard group="UI Kit — Web" name="Web UI kit · KNIK" subtitle="Click-thru recreation: chat → workflow hub → builder" viewport="1280x720" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>KNIK · Web</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="../../colors_and_type.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      body {
        background: var(--bg-base);
        background-image:
          radial-gradient(
            at 8% 0%,
            rgba(0, 217, 244, 0.1) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 95% 100%,
            rgba(20, 184, 166, 0.08) 0px,
            transparent 50%
          );
        color: var(--fg-2);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      textarea {
        font-family: inherit;
      }
      /* Scrollbars */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--bg-surface-3);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-3);
        background-clip: padding-box;
        border: 2px solid transparent;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel" src="Button.jsx"></script>
    <script type="text/babel" src="Card.jsx"></script>
    <script type="text/babel" src="StatusBadge.jsx"></script>
    <script type="text/babel" src="MetricCard.jsx"></script>
    <script type="text/babel" src="Sidebar.jsx"></script>
    <script type="text/babel" src="TopBar.jsx"></script>
    <script type="text/babel" src="SuggestionCards.jsx"></script>
    <script type="text/babel" src="InputPanel.jsx"></script>
    <script type="text/babel" src="ChatHome.jsx"></script>
    <script type="text/babel" src="ChatThread.jsx"></script>
    <script type="text/babel" src="WorkflowHub.jsx"></script>
    <script type="text/babel" src="WorkflowBuilder.jsx"></script>
    <script type="text/babel" src="App.jsx"></script>
  </body>
</html>
